services:
  haproxy:
    image: haproxy:alpine
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "20MB"

  api1:
    image: marcelocortess/rinha-java:ivf-bbox-v9-test
    command:
      - "-Divf.nprobe=1"
      - "-Dknn.slots=1"
      - "-Dserver.backlog=8192"
      - "-Dserver.inbuf=768"
      - "-Dserver.outbuf=512"
      - "-Dserver.header.max=2048"
      - "-Dserver.body.max=8192"
      - "-Dstartup.warmup.searches=20000"
    volumes:
      - sockets:/sockets
    environment:
      SERVER_SOCKET_PATH: /sockets/api1.sock
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"

  api2:
    image: marcelocortess/rinha-java:ivf-bbox-v9-test
    command:
      - "-Divf.nprobe=1"
      - "-Dknn.slots=1"
      - "-Dserver.backlog=8192"
      - "-Dserver.inbuf=768"
      - "-Dserver.outbuf=512"
      - "-Dserver.header.max=2048"
      - "-Dserver.body.max=8192"
      - "-Dstartup.warmup.searches=20000"
    volumes:
      - sockets:/sockets
    environment:
      SERVER_SOCKET_PATH: /sockets/api2.sock
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"

volumes:
  sockets:
