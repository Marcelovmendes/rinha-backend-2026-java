services:
  haproxy:
    image: haproxy:alpine
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "40MB"

  api1:
    image: marcelocortess/rinha-java:latest
    volumes:
      - sockets:/sockets
    environment:
      SERVER_SOCKET_PATH: /sockets/api1.sock
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "155MB"

  api2:
    image: marcelocortess/rinha-java:latest
    volumes:
      - sockets:/sockets
    environment:
      SERVER_SOCKET_PATH: /sockets/api2.sock
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "155MB"

volumes:
  sockets:
