services:
  haproxy:
    image: haproxy:alpine
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "20MB"

  api1:
    image: marcelocortess/rinha-java:ivf-bbox-v17-test
    command:
      - "-Divf.nprobe=1"
      - "-Dstartup.warmup.searches=20000"
    volumes:
      - sockets:/sockets
    environment:
      SERVER_SOCKET_PATH: /sockets/api1.sock
    deploy:
      resources:
        limits:
          cpus: "0.375"
          memory: "165MB"

  api2:
    image: marcelocortess/rinha-java:ivf-bbox-v17-test
    command:
      - "-Divf.nprobe=1"
      - "-Dstartup.warmup.searches=20000"
    volumes:
      - sockets:/sockets
    environment:
      SERVER_SOCKET_PATH: /sockets/api2.sock
    deploy:
      resources:
        limits:
          cpus: "0.375"
          memory: "165MB"

volumes:
  sockets:
